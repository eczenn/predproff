<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Марса - Предпрофессиональная олимпиада</title>
    <link rel="stylesheet" href="assets/styles/style.css" type="text/css">
</head>
<body>
    <h1>🚀 Картографический сервис Марса</h1>
    
    <div class="container">
        <div class="map-container">
            <canvas id="map-canvas" width="800" height="800"></canvas>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <h3>🌍 Данные</h3>
                <input type="text" id="api-url" 
                    value="https://olimp.miet.ru/ppo_it/api" 
                    placeholder="Адрес API">
                <button onclick="app.setApiUrl(document.getElementById('api-url').value)">
                    Загрузить карту
                </button>
            </div>
            
            <div class="control-group">
                <h3>👁️ Отображение</h3>
                <div class="button-group">
                    <button onclick="app.toggleModules()">Модули</button>
                    <button onclick="app.toggleStations()">Станции</button>
                </div>
                <button onclick="app.toggleCoverage()">Зоны покрытия</button>
            </div>
            
            <div class="control-group">
                <h3>📊 Статистика</h3>
                <div class="status">
                    <div class="status-item">
                        <span>Высоты:</span>
                        <span class="badge" id="height-range">0 - 255</span>
                    </div>
                    <div class="status-item">
                        <span>Модули:</span>
                        <span class="badge" id="modules-status">Не загружены</span>
                    </div>
                    <div class="status-item">
                        <span>Станции:</span>
                        <span class="badge" id="stations-count">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        Московская предпрофессиональная олимпиада | Практика «ИТ» 2024/2025
    </footer>

    <script type="module" src="./main.js"></script>
</body>
</html>
